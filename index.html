<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATOL PRO Enterprise</title>
    <style>
        :root {
            --primary: #4a90e2; --bg: #f0f4f8; --card-bg: #ffffff;
            --text-main: #2c3e50; --text-muted: #7f8c8d; --danger: #ff5252;
            --dark-panel: #1a1c23; --accent: #f1c40f;
        }
        body.dark-mode {
            --bg: #0f172a; --card-bg: #1e293b; --text-main: #f1f5f9;
            --text-muted: #94a3b8; --dark-panel: #020617;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; display: flex; justify-content: center; padding: 20px 10px; transition: 0.3s; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; background: var(--card-bg); border-radius: 24px; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        
        h2 { font-size: 1.2rem; margin: 0 0 20px 0; background: linear-gradient(135deg, var(--primary), #8e44ad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; text-align: center; }
        
        .card { background: rgba(127, 140, 141, 0.05); padding: 18px; border-radius: 18px; margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.03); }
        label { display: block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; color: var(--text-muted); }
        input, select { width: 100%; padding: 12px; border: 2px solid transparent; border-radius: 12px; background: var(--card-bg); color: var(--text-main); font-size: 1rem; font-weight: 600; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--primary); }

        .results { background: var(--dark-panel); color: #fff; padding: 20px; border-radius: 20px; margin-bottom: 15px; }
        .res-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95rem; }
        .val { font-family: monospace; font-size: 1.1rem; color: var(--primary); font-weight: 700; }
        .total-row { margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); font-weight: bold; }
        .total-row .val { color: var(--accent); font-size: 1.3rem; }
        
        .btn-main { width: 100%; padding: 16px; border: none; border-radius: 14px; background: linear-gradient(135deg, var(--primary), #357abd); color: white; font-weight: 700; cursor: pointer; transition: 0.2s; box-shadow: 0 8px 15px rgba(74, 144, 226, 0.3); margin-bottom: 10px; }
        .btn-main:active { transform: scale(0.98); }

        .history-section { flex-grow: 1; margin-top: 10px; }
        .table-wrap { background: rgba(127, 140, 141, 0.03); border-radius: 12px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; min-width: 420px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid rgba(0,0,0,0.02); }
        .f-sum { background: rgba(74, 144, 226, 0.1); font-weight: 700; color: var(--primary); }

        /* Нижняя панель управления */
        .bottom-bar { display: flex; justify-content: space-around; align-items: center; margin-top: 25px; padding-top: 15px; border-top: 1px solid rgba(127, 140, 141, 0.2); }
        .control-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; display: flex; flex-direction: column; align-items: center; gap: 5px; color: var(--text-muted); font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .control-btn span.icon { font-size: 1.4rem; filter: grayscale(0.5); }
        .control-btn:hover span.icon { filter: grayscale(0); transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <h2>ATOL PRO <span style="font-weight:300">v4.5</span></h2>

    <div class="card">
        <label>Кубатура (м³)</label>
        <input type="number" id="volume" placeholder="0.000" oninput="calculate()">

        <label style="margin-top:15px">Плотность (Целевая)</label>
        <select id="density" onchange="calculate()">
            <optgroup label="СМЕШИВАНИЕ С ВОДОЙ">
                <option value="1.01" data-v118="0.056" data-v148="0" data-water="0.944">1.01</option>
                <option value="1.02" data-v118="0.111" data-v148="0" data-water="0.889">1.02</option>
                <option value="1.03" data-v118="0.167" data-v148="0" data-water="0.833">1.03</option>
                <option value="1.04" data-v118="0.222" data-v148="0" data-water="0.778">1.04</option>
                <option value="1.05" data-v118="0.278" data-v148="0" data-water="0.722">1.05</option>
                <option value="1.06" data-v118="0.333" data-v148="0" data-water="0.667">1.06</option>
                <option value="1.07" data-v118="0.389" data-v148="0" data-water="0.611">1.07</option>
                <option value="1.08" data-v118="0.444" data-v148="0" data-water="0.556">1.08</option>
                <option value="1.09" data-v118="0.500" data-v148="0" data-water="0.500">1.09</option>
                <option value="1.10" data-v118="0.556" data-v148="0" data-water="0.444">1.10</option>
                <option value="1.11" data-v118="0.611" data-v148="0" data-water="0.389">1.11</option>
                <option value="1.12" data-v118="0.667" data-v148="0" data-water="0.333">1.12</option>
                <option value="1.13" data-v118="0.722" data-v148="0" data-water="0.278">1.13</option>
                <option value="1.14" data-v118="0.778" data-v148="0" data-water="0.222">1.14</option>
                <option value="1.15" data-v118="0.833" data-v148="0" data-water="0.167">1.15</option>
                <option value="1.16" data-v118="0.889" data-v148="0" data-water="0.111">1.16</option>
                <option value="1.17" data-v118="0.944" data-v148="0" data-water="0.056">1.17</option>
                <option value="1.18" data-v118="1.000" data-v148="0" data-water="0" selected>1.18 (Чистый)</option>
            </optgroup>
            <optgroup label="СМЕШИВАНИЕ 1.18 + 1.48">
                <option value="1.19" data-v118="0.967" data-v148="0.033" data-water="0">1.19</option>
                <option value="1.20" data-v118="0.933" data-v148="0.067" data-water="0">1.20</option>
                <option value="1.21" data-v118="0.900" data-v148="0.100" data-water="0">1.21</option>
                <option value="1.22" data-v118="0.867" data-v148="0.133" data-water="0">1.22</option>
                <option value="1.23" data-v118="0.833" data-v148="0.167" data-water="0">1.23</option>
                <option value="1.24" data-v118="0.800" data-v148="0.200" data-water="0">1.24</option>
                <option value="1.25" data-v118="0.767" data-v148="0.233" data-water="0">1.25</option>
                <option value="1.26" data-v118="0.733" data-v148="0.267" data-water="0">1.26</option>
                <option value="1.27" data-v118="0.700" data-v148="0.300" data-water="0">1.27</option>
                <option value="1.28" data-v118="0.667" data-v148="0.333" data-water="0">1.28</option>
                <option value="1.29" data-v118="0.633" data-v148="0.367" data-water="0">1.29</option>
                <option value="1.30" data-v118="0.600" data-v148="0.400" data-water="0">1.30</option>
                <option value="1.31" data-v118="0.567" data-v148="0.433" data-water="0">1.31</option>
                <option value="1.32" data-v118="0.533" data-v148="0.467" data-water="0">1.32</option>
                <option value="1.33" data-v118="0.500" data-v148="0.500" data-water="0">1.33</option>
                <option value="1.34" data-v118="0.467" data-v148="0.533" data-water="0">1.34</option>
                <option value="1.35" data-v118="0.433" data-v148="0.567" data-water="0">1.35</option>
                <option value="1.36" data-v118="0.400" data-v148="0.600" data-water="0">1.36</option>
                <option value="1.37" data-v118="0.367" data-v148="0.633" data-water="0">1.37</option>
                <option value="1.38" data-v118="0.333" data-v148="0.667" data-water="0">1.38</option>
                <option value="1.39" data-v118="0.300" data-v148="0.700" data-water="0">1.39</option>
                <option value="1.40" data-v118="0.267" data-v148="0.733" data-water="0">1.40</option>
                <option value="1.41" data-v118="0.233" data-v148="0.767" data-water="0">1.41</option>
                <option value="1.42" data-v118="0.200" data-v148="0.800" data-water="0">1.42</option>
                <option value="1.43" data-v118="0.167" data-v148="0.833" data-water="0">1.43</option>
                <option value="1.44" data-v118="0.133" data-v148="0.867" data-water="0">1.44</option>
                <option value="1.45" data-v118="0.100" data-v148="0.900" data-water="0">1.45</option>
                <option value="1.46" data-v118="0.067" data-v148="0.933" data-water="0">1.46</option>
                <option value="1.47" data-v118="0.033" data-v148="0.967" data-water="0">1.47</option>
                <option value="1.48" data-v118="0" data-v148="1.000" data-water="0">1.48 (Чистый)</option>
            </optgroup>
        </select>
    </div>

    <div class="results">
        <div class="res-row"><span>1.18 Реагент</span> <span id="res118" class="val">0.000</span></div>
        <div class="res-row"><span>1.48 Реагент</span> <span id="res148" class="val">0.000</span></div>
        <div class="res-row"><span>Тех. вода</span> <span id="resWater" class="val">0.000</span></div>
        <div class="res-row total-row"><span>ИТОГО ВЫДАЧА</span> <span id="resTotal" class="val">0.000</span></div>
    </div>

    <button class="btn-main" onclick="addToHistory()">ДОБАВИТЬ В ИСТОРИЮ</button>

    <div class="history-section">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <span style="font-size:0.7rem; color:var(--text-muted); font-weight:bold;">ПОСЛЕДНИЕ 10 ЗАПИСЕЙ</span>
            <span onclick="clearHistory()" style="font-size:0.7rem; color:var(--danger); cursor:pointer;">ОЧИСТИТЬ</span>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>Пл.</th><th>Объем</th><th>1.18</th><th>1.48</th><th>Вода</th><th></th></tr>
                </thead>
                <tbody id="historyBody"></tbody>
                <tfoot>
                    <tr class="f-sum">
                        <td colspan="2">Итог:</td>
                        <td id="sum118">0.000</td>
                        <td id="sum148">0.000</td>
                        <td id="sumWater">0.000</td>
                        <td></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="control-btn" onclick="toggleTheme()">
            <span class="icon">🌓</span>ТЕМА
        </button>
        <button id="installBtn" class="control-btn" style="display:none; color: #34a853;">
            <span class="icon">📲</span>СКАЧАТЬ
        </button>
        <button class="control-btn" onclick="toggleFullscreen()">
            <span class="icon">📺</span>ЭКРАН
        </button>
    </div>
</div>

<script>
    let historyData = JSON.parse(localStorage.getItem('atolHistory')) || [];
    window.onload = updateTable;

    function calculate() {
        const volume = parseFloat(document.getElementById('volume').value);
        const opt = document.getElementById('density').selectedOptions[0];
        if (volume > 0) {
            const v118 = (volume * parseFloat(opt.dataset.v118)).toFixed(3);
            const v148 = (volume * parseFloat(opt.dataset.v148)).toFixed(3);
            const vWater = (volume * parseFloat(opt.dataset.water)).toFixed(3);
            document.getElementById('res118').innerText = v118;
            document.getElementById('res148').innerText = v148;
            document.getElementById('resWater').innerText = vWater;
            document.getElementById('resTotal').innerText = (parseFloat(v118) + parseFloat(v148) + parseFloat(vWater)).toFixed(3);
        } else { resetRes(); }
    }

    function addToHistory() {
        const vol = document.getElementById('volume').value;
        if (!vol || vol <= 0) return;
        const record = { id: Date.now(), dens: document.getElementById('density').value, vol: vol, v118: document.getElementById('res118').innerText, v148: document.getElementById('res148').innerText, water: document.getElementById('resWater').innerText };
        historyData.unshift(record);
        if (historyData.length > 10) historyData.pop();
        save();
    }

    function deleteItem(id) { historyData = historyData.filter(i => i.id !== id); save(); }
    function save() { localStorage.setItem('atolHistory', JSON.stringify(historyData)); updateTable(); }

    function updateTable() {
        const b = document.getElementById('historyBody'); b.innerHTML = "";
        let s1 = 0, s2 = 0, s3 = 0;
        historyData.forEach(i => {
            s1 += parseFloat(i.v118); s2 += parseFloat(i.v148); s3 += parseFloat(i.water);
            b.innerHTML += `<tr><td><b>${i.dens}</b></td><td>${i.vol}</td><td>${i.v118}</td><td>${i.v148}</td><td>${i.water}</td><td onclick="deleteItem(${i.id})" style="color:var(--danger); cursor:pointer; font-weight:bold;">✕</td></tr>`;
        });
        document.getElementById('sum118').innerText = s1.toFixed(3);
        document.getElementById('sum148').innerText = s2.toFixed(3);
        document.getElementById('sumWater').innerText = s3.toFixed(3);
    }

    function clearHistory() { if(confirm("Очистить историю?")) { historyData = []; save(); } }
    function resetRes() { ['res118','res148','resWater','resTotal'].forEach(id => document.getElementById(id).innerText = "0.000"); }
    
    function toggleTheme() { document.body.classList.toggle('dark-mode'); }
    
    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
        }
    }

    // Установка приложения
    let defP;
    const inst = document.getElementById('installBtn');
    window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); defP = e; inst.style.display = 'flex'; });
    inst.addEventListener('click', async () => { if (defP) { defP.prompt(); defP = null; inst.style.display = 'none'; } });
</script>
</body>
</html>
